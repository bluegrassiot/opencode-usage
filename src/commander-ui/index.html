<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>commander-ui</title>
    <script>
      (function () {
        var t = localStorage.getItem("commander-theme");
        var d =
          t === "dark" ||
          (t !== "light" && matchMedia("(prefers-color-scheme:dark)").matches);
        if (d) document.documentElement.classList.add("dark");
      })();
    </script>
    <style id="usage-dominant-patch">
      /* Layout override: hide the Quota Status panel and give the Usage Breakdown
         table the whole screen. Root layout is `grid-rows-[auto_2fr_1fr]`
         = [status bar] / [quota] / [usage].
         To show quota as a small strip instead, use:
           grid-template-rows: auto minmax(0, 30vh) minmax(0, 1fr)
         and remove the display:none rule below. */
      .grid-rows-\[auto_2fr_1fr\] {
        grid-template-rows: auto minmax(0, 1fr) !important;
      }
      .grid-rows-\[auto_2fr_1fr\] > div:nth-child(2) {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
